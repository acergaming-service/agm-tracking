<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遊戲片追貨平台</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--surface:#ffffff;--surface2:#f7f8fa;
  --border:#d8dde6;--border2:#b8c0cc;
  --text:#1a2030;--text2:#3d4a5c;--text3:#7a8699;
  --accent:#1d6ef5;--accent-dim:#e8f0fe;
  --green:#16a34a;--green-dim:#f0faf4;
  --red:#dc2626;--red-dim:#fef2f2;
  --amber:#d97706;--amber-dim:#fffbeb;
  --purple:#7c3aed;--purple-dim:#f5f3ff;
  --font:'Noto Sans TC',sans-serif;
  --radius:14px;--radius-sm:10px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.login-wrap{width:100%;max-width:480px}
.logo{text-align:center;margin-bottom:2.5rem}
.logo-icon{display:inline-flex;align-items:center;justify-content:center;width:72px;height:72px;background:var(--accent-dim);border-radius:20px;margin-bottom:1rem;font-size:36px}
.logo h1{font-size:1.8rem;font-weight:900;color:var(--text);letter-spacing:-0.02em}
.logo p{font-size:1rem;color:var(--text2);margin-top:6px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;box-shadow:var(--shadow)}
.card-label{font-size:0.85rem;font-weight:700;color:var(--text3);margin-bottom:1rem;letter-spacing:0.06em;text-transform:uppercase}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem}
.role-btn{background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius-sm);padding:1.2rem 0.75rem;cursor:pointer;text-align:center;transition:all 0.15s;color:var(--text2);font-family:var(--font)}
.role-btn:hover{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.role-btn.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.role-btn .ri{font-size:2rem;margin-bottom:8px;display:block}
.role-btn strong{display:block;font-weight:700;font-size:1rem;margin-bottom:3px}
.role-btn span{font-size:0.82rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:0.9rem;font-weight:600;color:var(--text2);margin-bottom:8px}
.form-group select,.form-group input{
  width:100%;background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text);font-family:var(--font);font-size:1rem;padding:0.75rem 1rem;outline:none;transition:border-color 0.15s;-webkit-appearance:none}
.form-group select:focus,.form-group input:focus{border-color:var(--accent)}
.form-group select option{background:#fff}
.btn-primary{
  width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);
  padding:0.9rem;font-family:var(--font);font-size:1.05rem;font-weight:700;cursor:pointer;transition:opacity 0.15s;margin-top:0.5rem}
.btn-primary:hover{opacity:0.88}
.info-box{background:var(--accent-dim);border:1px solid rgba(29,110,245,0.2);border-radius:var(--radius-sm);padding:1rem;font-size:0.9rem;color:var(--text2);line-height:1.7}
#error-msg{background:var(--red-dim);border:1px solid rgba(220,38,38,0.25);border-radius:var(--radius-sm);padding:0.75rem 1rem;font-size:0.9rem;color:var(--red);margin-bottom:1rem}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="logo-icon">🎮</div>
    <h1>遊戲片追貨平台</h1>
    <p>AGM 訂貨管理系統</p>
  </div>
  <div class="card">
    <div class="card-label">選擇登入角色</div>
    <div class="role-grid">
      <button class="role-btn" onclick="selectRole('dealer',this)">
        <span class="ri">🏪</span><strong>經銷商</strong><span>使用專屬連結進入</span>
      </button>
      <button class="role-btn" onclick="selectRole('sales',this)">
        <span class="ri">💼</span><strong>業務 AGM</strong><span>查看轄區訂單</span>
      </button>
      <button class="role-btn" onclick="selectRole('logistics',this)">
        <span class="ri">📊</span><strong>後勤統計</strong><span>全通路彙整</span>
      </button>
      <button class="role-btn" onclick="selectRole('pm',this)">
        <span class="ri">⚙️</span><strong>PM 管理</strong><span>商品與 MOQ 設定</span>
      </button>
    </div>
    <div id="error-msg" class="hidden"></div>
    <div id="form-dealer" class="hidden">
      <div class="info-box">經銷商請使用業務提供的<strong>專屬連結</strong>直接進入填單頁面，無需帳號或密碼。<br>連結格式：<code style="font-size:0.85rem;color:var(--accent)">dealer.html?code=WQ2025</code></div>
    </div>
    <div id="form-sales" class="hidden">
      <div class="form-group">
        <label>業務帳號</label>
        <select id="sales-select">
          <option value="">── 請選擇 ──</option>
          <option value="Edward">Edward</option><option value="Wythe">Wythe</option>
          <option value="Eric">Eric</option><option value="Hsinhui">Hsinhui</option>
          <option value="AKI">AKI</option><option value="Tom">Tom</option>
          <option value="Mickey">Mickey</option><option value="Meg">Meg</option>
        </select>
      </div>
    </div>
    <div id="form-staff" class="hidden">
      <div class="form-group">
        <label>存取碼</label>
        <input type="password" id="staff-pwd" placeholder="輸入存取碼">
      </div>
    </div>
    <button class="btn-primary hidden" id="login-btn" onclick="doLogin()">進入系統 →</button>
  </div>
</div>
<script>
let currentRole=null;
function selectRole(role,el){
  currentRole=role;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  ['dealer','sales','staff'].forEach(f=>document.getElementById('form-'+f).classList.add('hidden'));
  document.getElementById('error-msg').classList.add('hidden');
  if(role==='dealer') document.getElementById('form-dealer').classList.remove('hidden');
  else if(role==='sales') document.getElementById('form-sales').classList.remove('hidden');
  else document.getElementById('form-staff').classList.remove('hidden');
  document.getElementById('login-btn').classList.remove('hidden');
}
function showError(msg){const e=document.getElementById('error-msg');e.textContent=msg;e.classList.remove('hidden')}
function doLogin(){
  document.getElementById('error-msg').classList.add('hidden');
  if(!currentRole) return showError('請先選擇角色');
  if(currentRole==='dealer'){showError('經銷商請使用業務提供的專屬連結進入');return;}
  if(currentRole==='sales'){
    const v=document.getElementById('sales-select').value;
    if(!v) return showError('請選擇業務帳號');
    sessionStorage.setItem('role','sales');sessionStorage.setItem('sales',v);location.href='sales.html';
  } else if(currentRole==='logistics'){
    if(document.getElementById('staff-pwd').value!=='agm2025') return showError('存取碼錯誤');
    sessionStorage.setItem('role','logistics');location.href='logistics.html';
  } else if(currentRole==='pm'){
    if(document.getElementById('staff-pwd').value!=='pm2025') return showError('存取碼錯誤');
    sessionStorage.setItem('role','pm');location.href='pm.html';
  }
}
document.getElementById('staff-pwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
</script>
</body>
</html>
