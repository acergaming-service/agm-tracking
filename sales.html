<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務檢視 — 遊戲片追貨平台</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--surface:#fff;--surface2:#f7f8fa;--border:#d8dde6;
  --text:#1a2030;--text2:#3d4a5c;--text3:#7a8699;
  --accent:#1d6ef5;--accent-dim:#e8f0fe;
  --green:#16a34a;--green-dim:#f0faf4;--green-b:#bbf7d0;
  --red:#dc2626;--red-dim:#fef2f2;--red-b:#fecaca;
  --amber:#d97706;--amber-dim:#fffbeb;--amber-b:#fde68a;
  --font:'Noto Sans TC',sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:12px;--radius-sm:8px;--shadow:0 2px 8px rgba(0,0,0,0.07);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
nav{background:#fff;border-bottom:2px solid var(--border);padding:0 1.5rem;height:64px;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.nav-logo{font-weight:900;font-size:1.1rem;display:flex;align-items:center;gap:8px}
.nav-tag{font-size:0.82rem;background:var(--accent-dim);color:var(--accent);border:2px solid #bfcffe;border-radius:20px;padding:4px 14px;font-weight:700}
.nav-right{margin-left:auto;display:flex;gap:10px;align-items:center}
.btn-sm{background:#fff;border:2px solid var(--border);color:var(--text2);border-radius:var(--radius-sm);padding:7px 16px;font-family:var(--font);font-size:0.9rem;font-weight:600;cursor:pointer}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite;margin-right:5px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}@keyframes spin{to{transform:rotate(360deg)}}
.container{max-width:1100px;margin:0 auto;padding:1.5rem}
.page-header{margin-bottom:1.5rem}
.page-header h1{font-size:1.6rem;font-weight:900;margin-bottom:6px}
.page-header p{font-size:0.95rem;color:var(--text2)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem}
.stat-card{background:#fff;border:2px solid var(--border);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow)}
.stat-label{font-size:0.82rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px}
.stat-val{font-size:2rem;font-weight:900;font-family:var(--mono)}
.c-green{color:var(--green)}.c-amber{color:var(--amber)}.c-blue{color:var(--accent)}
.dealer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:1.5rem}
.dealer-card{background:#fff;border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.dealer-header{padding:14px 18px;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2)}
.dealer-name{font-weight:700;font-size:1rem}
.dealer-status{font-size:0.78rem;padding:4px 10px;border-radius:10px;font-weight:700}
.ds-filled{background:var(--green-dim);color:var(--green);border:1px solid var(--green-b)}
.ds-partial{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-b)}
.ds-empty{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
.order-item{display:flex;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--border);font-size:0.9rem;gap:10px}
.order-item:last-child{border-bottom:none}
.oi-name{color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.oi-qty{font-family:var(--mono);font-weight:700;color:var(--text);white-space:nowrap}
.dealer-footer{padding:10px 18px;background:var(--surface2);display:flex;justify-content:space-between;font-size:0.85rem;color:var(--text2);font-weight:600}
.no-orders{padding:20px;text-align:center;font-size:0.92rem;color:var(--text3)}
.tbl-wrap{background:#fff;border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1.5rem;box-shadow:var(--shadow)}
.tbl-header{padding:14px 18px;border-bottom:2px solid var(--border);background:var(--surface2)}
.tbl-title{font-size:1rem;font-weight:700}
table{width:100%;border-collapse:collapse}
th{font-size:0.78rem;font-weight:700;color:var(--text3);text-align:left;padding:10px 14px;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--border);background:var(--surface2)}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:0.92rem;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.gap-badge{font-size:0.78rem;padding:3px 10px;border-radius:6px;font-weight:700;display:inline-block}
.gap-need{background:var(--red-dim);color:var(--red);border:1px solid var(--red-b)}
.gap-ok{background:var(--green-dim);color:var(--green);border:1px solid var(--green-b)}
.platform-tag{font-family:var(--mono);font-size:0.75rem;padding:3px 8px;border-radius:5px;font-weight:600;display:inline-block}
.NS{color:#1d6ef5;background:#e8f0fe;border:1px solid #bfcffe}
.PS5{color:#7c3aed;background:#f5f3ff;border:1px solid #ddd6fe}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;z-index:9999}
.loading-spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="loading-screen" id="loading-screen"><div class="loading-spinner"></div><p style="font-size:1rem;color:#3d4a5c;font-weight:500">連線中，請稍候…</p></div>
<nav>
  <div class="nav-logo"><span>💼</span> 遊戲片追貨平台</div>
  <span class="nav-tag">業務檢視</span>
  <span style="font-size:0.85rem;color:var(--text2);font-weight:500"><span class="live-dot"></span>即時同步</span>
  <div class="nav-right">
    <strong id="nav-sales" style="font-size:0.95rem;color:var(--text)">—</strong>
    <button class="btn-sm" onclick="location.href='index.html'">登出</button>
  </div>
</nav>
<div class="container">
  <div class="page-header"><h1 id="page-title">本週轄區訂單總覽</h1><p id="page-sub">僅顯示您負責的通路</p></div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">轄區通路數</div><div class="stat-val c-blue" id="st-dealers">—</div></div>
    <div class="stat-card"><div class="stat-label">合計訂購量</div><div class="stat-val c-green" id="st-qty">—</div></div>
    <div class="stat-card"><div class="stat-label">MOQ 需確認</div><div class="stat-val c-amber" id="st-moq">—</div></div>
  </div>
  <div id="dealer-grid" class="dealer-grid"></div>
  <div class="tbl-wrap" id="moq-wrap">
    <div class="tbl-header"><span class="tbl-title">⚠️ 本週 MOQ 缺口警示</span></div>
    <table><thead><tr>
      <th style="width:65px">平台</th><th>品名</th>
      <th style="width:70px;text-align:right">MOQ</th>
      <th style="width:80px;text-align:right">已登記</th>
      <th style="width:90px;text-align:center">缺口</th>
    </tr></thead><tbody id="moq-tbody"></tbody></table>
  </div>
</div>
<script>
const FIREBASE_CONFIG={apiKey:"AIzaSyA-eDT7V7asiQ5ebGca-wBif8P-uW89_iQ",authDomain:"agm-tracking.firebaseapp.com",databaseURL:"https://agm-tracking-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"agm-tracking",storageBucket:"agm-tracking.firebasestorage.app",messagingSenderId:"91450833150",appId:"1:91450833150:web:79e5b01783be48ebff4daf"};
const SALES=sessionStorage.getItem('sales');
if(!SALES||sessionStorage.getItem('role')!=='sales')location.href='index.html';
let fbDB,products={},dealers={},orders={};
window.addEventListener('DOMContentLoaded',async()=>{
  try{
    if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);
    fbDB=firebase.database();
    const[pSnap,dSnap]=await Promise.all([fbDB.ref('products').once('value'),fbDB.ref('dealers').once('value')]);
    products=pSnap.val()||{};dealers=dSnap.val()||{};
    document.getElementById('nav-sales').textContent=SALES;
    document.getElementById('page-title').textContent=SALES+' 本週轄區訂單';
    fbDB.ref('orders').on('value',snap=>{orders=snap.val()||{};renderAll();});
    document.getElementById('loading-screen').classList.add('hidden');
  }catch(err){document.getElementById('loading-screen').innerHTML=`<div style="text-align:center;color:#dc2626;padding:2rem"><div style="font-size:3rem">⚠️</div><div style="font-size:1rem;font-weight:600;margin-top:1rem">${err.message}</div></div>`;}
});
function renderAll(){
  const myDealers=Object.entries(dealers).filter(([,d])=>d.sales.toLowerCase().trim()===SALES.toLowerCase().trim()).map(([id,d])=>({id,...d}));
  const allProds=Object.values(products).flatMap(v=>Object.values(v));
  document.getElementById('page-sub').textContent=`轄區共 ${myDealers.length} 個通路`;
  document.getElementById('st-dealers').textContent=myDealers.length;
  let totalQty=0;
  document.getElementById('dealer-grid').innerHTML=myDealers.map(dealer=>{
    const dOrders=orders[dealer.id]||{};
    const items=Object.entries(dOrders).filter(([,v])=>v?.qty>0).map(([pid,v])=>({prod:allProds.find(p=>p.id===pid),qty:v.qty,submitted:v.submitted})).filter(o=>o.prod);
    const qty=items.reduce((s,o)=>s+o.qty,0);totalQty+=qty;
    const submitted=items.some(o=>o.submitted);
    const sc=items.length===0?'ds-empty':submitted?'ds-filled':'ds-partial';
    const sl=items.length===0?'未填單':submitted?'已送出':'填寫中';
    return `<div class="dealer-card">
      <div class="dealer-header"><span class="dealer-name">${dealer.name}</span><span class="dealer-status ${sc}">${sl}</span></div>
      <div>${items.length===0?'<div class="no-orders">本週尚未填單</div>':
        items.slice(0,6).map(o=>`<div class="order-item"><span class="oi-name">${o.prod.name}</span><span class="oi-qty">× ${o.qty}</span></div>`).join('')
        +(items.length>6?`<div class="order-item"><span style="color:var(--text3)">…另 ${items.length-6} 項</span></div>`:'')}
      </div>
      ${items.length>0?`<div class="dealer-footer"><span>${items.length} 品項</span><span>合計 ${qty} 件</span></div>`:''}
    </div>`;
  }).join('');
  document.getElementById('st-qty').textContent=totalQty;
  const moqRows=allProds.map(p=>{
    const total=myDealers.reduce((s,d)=>s+((orders[d.id]||{})[p.id]?.qty||0),0);
    return total>0&&total<p.moq?{p,total}:null;
  }).filter(Boolean);
  document.getElementById('st-moq').textContent=moqRows.length;
  if(!moqRows.length){
    document.getElementById('moq-wrap').innerHTML=`<div class="tbl-header"><span class="tbl-title" style="color:var(--green)">✅ 本週轄區無 MOQ 缺口，一切正常</span></div>`;
  } else {
    document.getElementById('moq-tbody').innerHTML=moqRows.map(({p,total})=>
      `<tr><td><span class="platform-tag ${p.platform}">${p.platform}</span></td>
       <td><strong style="font-size:0.92rem">${p.name}</strong></td>
       <td style="text-align:right;font-family:var(--mono);font-weight:600">${p.moq}</td>
       <td style="text-align:right;font-family:var(--mono);font-weight:700;color:var(--amber)">${total}</td>
       <td style="text-align:center"><span class="gap-badge gap-need">缺 ${p.moq-total}</span></td>
      </tr>`).join('');
  }
}
</script>
</body>
</html>
