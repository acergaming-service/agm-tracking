<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM 管理 — 遊戲片追貨平台</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--surface:#fff;--surface2:#f7f8fa;--border:#d8dde6;--border2:#b8c0cc;
  --text:#1a2030;--text2:#3d4a5c;--text3:#7a8699;
  --accent:#1d6ef5;--accent-dim:#e8f0fe;
  --green:#16a34a;--green-dim:#f0faf4;--green-b:#bbf7d0;
  --red:#dc2626;--red-dim:#fef2f2;--red-b:#fecaca;
  --amber:#d97706;--amber-dim:#fffbeb;--amber-b:#fde68a;
  --purple:#7c3aed;--purple-dim:#f5f3ff;--purple-b:#ddd6fe;
  --font:'Noto Sans TC',sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:12px;--radius-sm:8px;--shadow:0 2px 8px rgba(0,0,0,0.07);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
nav{background:#fff;border-bottom:2px solid var(--border);padding:0 1.5rem;height:64px;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.nav-logo{font-weight:900;font-size:1.1rem;display:flex;align-items:center;gap:8px}
.nav-tag{font-size:0.82rem;background:var(--purple-dim);color:var(--purple);border:2px solid var(--purple-b);border-radius:20px;padding:4px 14px;font-weight:700}
.nav-right{margin-left:auto;display:flex;gap:10px;align-items:center}
.btn-sm{background:#fff;border:2px solid var(--border);color:var(--text2);border-radius:var(--radius-sm);padding:7px 16px;font-family:var(--font);font-size:0.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-seed{background:var(--amber-dim);border:2px solid var(--amber-b);color:var(--amber);border-radius:var(--radius-sm);padding:7px 16px;font-family:var(--font);font-size:0.9rem;font-weight:700;cursor:pointer}
.container{max-width:1300px;margin:0 auto;padding:1.5rem}
.page-header{margin-bottom:1.5rem}
.page-header h1{font-size:1.6rem;font-weight:900;margin-bottom:6px}
.page-header p{font-size:0.95rem;color:var(--text2)}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap}
.tab{padding:10px 22px;border-radius:var(--radius-sm);font-size:0.95rem;font-weight:700;cursor:pointer;border:2px solid var(--border);background:#fff;color:var(--text2);font-family:var(--font);transition:all .15s}
.tab:hover{border-color:var(--accent);color:var(--accent)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.2rem;align-items:center}
.filter-select{background:#fff;border:2px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:0.9rem;font-weight:500;padding:7px 12px;outline:none;cursor:pointer;-webkit-appearance:none}
.filter-select:focus{border-color:var(--accent)}
.filter-search{background:#fff;border:2px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:0.9rem;padding:7px 12px;outline:none;width:220px}
.filter-search:focus{border-color:var(--accent)}
.filter-count{font-size:0.85rem;color:var(--text3);margin-left:auto;font-weight:600}

/* TABLE */
.tbl-wrap{background:#fff;border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1.5rem;box-shadow:var(--shadow)}
.tbl-header{padding:14px 18px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface2)}
.tbl-title{font-size:1rem;font-weight:700}
.tbl-sub{font-size:0.82rem;color:var(--text2);margin-left:auto;font-weight:500}
table{width:100%;border-collapse:collapse}
th{font-size:0.75rem;font-weight:700;color:var(--text3);text-align:left;padding:9px 12px;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap}
td{padding:7px 12px;border-bottom:1px solid var(--border);font-size:0.88rem;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.platform-tag{font-family:var(--mono);font-size:0.72rem;padding:2px 7px;border-radius:5px;font-weight:700;display:inline-block;white-space:nowrap}
.NS{color:#1d6ef5;background:#e8f0fe;border:1px solid #bfcffe}
.NS2{color:#0d47a1;background:#dce5ff;border:1px solid #9ab0ff}
.PS5{color:#7c3aed;background:#f5f3ff;border:1px solid #ddd6fe}
.PS4{color:#059669;background:#ecfdf5;border:1px solid #a7f3d0}
.VR{color:#dc2626;background:#fef2f2;border:1px solid #fecaca}

/* INLINE INPUTS */
.inline-num{width:78px;background:#fff;border:2px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--mono);font-size:0.92rem;font-weight:600;text-align:right;padding:4px 7px;outline:none;transition:border-color .15s}
.inline-num:focus{border-color:var(--accent)}
.inline-num.filled{border-color:var(--green);background:var(--green-dim)}
.inline-text{background:#fff;border:2px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:0.88rem;padding:4px 8px;outline:none;transition:border-color .15s;width:130px}
.inline-text:focus{border-color:var(--accent)}
.inline-text.filled{border-color:var(--amber);background:var(--amber-dim)}
.inline-select{background:#fff;border:2px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:0.85rem;font-weight:600;padding:4px 8px;outline:none;-webkit-appearance:none;cursor:pointer;min-width:110px}
.inline-select:focus{border-color:var(--accent)}

/* STATUS COLOURS */
.s-empty{background:#f3f4f6;color:var(--text3);border-color:var(--border)}
.s-available{background:var(--surface2);color:var(--text2);border-color:var(--border2)}
.s-instock{background:var(--green-dim);color:var(--green);border-color:var(--green-b)}
.s-incoming{background:var(--accent-dim);color:var(--accent);border-color:#bfcffe}
.s-limited{background:var(--amber-dim);color:var(--amber);border-color:var(--amber-b)}
.s-tbc{background:var(--amber-dim);color:var(--amber);border-color:var(--amber-b)}
.s-unavailable{background:var(--red-dim);color:var(--red);border-color:var(--red-b)}
.s-clearance{background:var(--purple-dim);color:var(--purple);border-color:var(--purple-b)}
.s-delayed{background:var(--red-dim);color:var(--red);border-color:var(--red-b)}
.s-preorder{background:var(--accent-dim);color:var(--accent);border-color:#bfcffe}

/* PROGRESS */
.prog-wrap{height:7px;background:var(--surface2);border-radius:3px;overflow:hidden;width:80px;border:1px solid var(--border)}
.prog-bar{height:100%;border-radius:3px;transition:width .3s}
.prog-ok{background:var(--green)}.prog-low{background:var(--amber)}.prog-zero{background:#d8dde6}

/* ADD FORM */
.add-form{background:#fff;border:2px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem;box-shadow:var(--shadow)}
.add-form h3{font-size:1rem;font-weight:700;margin-bottom:1rem;color:var(--text2)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:1.2rem}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:0.8rem;font-weight:700;color:var(--text3)}
.fg input,.fg select{background:#fff;border:2px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:0.92rem;padding:7px 10px;outline:none;-webkit-appearance:none}
.fg input:focus,.fg select:focus{border-color:var(--accent)}
.btn-add{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 22px;font-family:var(--font);font-size:0.92rem;font-weight:700;cursor:pointer}
.btn-add-green{background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 16px;font-family:var(--font);font-size:0.88rem;font-weight:700;cursor:pointer}
.btn-del{background:#fff;border:2px solid var(--red-b);color:var(--red);cursor:pointer;font-size:0.82rem;padding:3px 9px;border-radius:6px;font-weight:700}
.btn-del:hover{background:var(--red-dim)}
.alloc-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--amber);margin-right:5px}

.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;z-index:9999}
.loading-spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
.toast{position:fixed;top:24px;right:24px;background:var(--green);color:#fff;padding:12px 20px;border-radius:var(--radius-sm);font-weight:700;font-size:0.95rem;z-index:9999;box-shadow:var(--shadow)}
</style>
</head>
<body>
<div class="loading-screen" id="loading-screen"><div class="loading-spinner"></div><p style="font-size:1rem;color:var(--text2);font-weight:500">連線中…</p></div>
<nav>
  <div class="nav-logo"><span>⚙️</span> 遊戲片追貨平台</div>
  <span class="nav-tag">PM 管理</span>
  <div class="nav-right">
    <button class="btn-seed" onclick="seedDB()">初始化資料庫</button>
    <button class="btn-sm" onclick="location.href='index.html'">登出</button>
  </div>
</nav>
<div class="container">
  <div class="page-header"><h1>商品 ＆ MOQ 管理</h1><p>維護品項狀態、到貨日、向原廠下單量</p></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('products',this)">📦 商品管理</button>
    <button class="tab" onclick="switchTab('moq',this)">📋 向原廠追加下單</button>
  </div>

  <!-- ══ MOQ 回填 ══ -->
  <div id="tab-moq" class="hidden">
    <div class="filter-bar">
      <select class="filter-select" id="moq-vendor" onchange="renderMOQ()">
        <option value="">全部代理商</option>
        <option value="BNE">BNE（萬代南夢宮）</option>
        <option value="GS">GSE（Game Source）</option>
        <option value="SONY">SONY</option>
      </select>
      <select class="filter-select" id="moq-platform" onchange="renderMOQ()">
        <option value="">全部平台</option>
        <option>NS</option><option>NS2</option>
        <option>PS5</option><option>PS4</option><option>VR</option>
      </select>
      <select class="filter-select" id="moq-category" onchange="renderMOQ()">
        <option value="">全部類型</option>
      </select>
      <select class="filter-select" id="moq-status" onchange="renderMOQ()">
        <option value="">全部狀態</option>
        <option value="">— 未設定</option>
        <option value="instock">現庫可出</option>
        <option value="incoming">即將到貨</option>
        <option value="limited">限量出完為止</option>
        <option value="tbc">確認供貨中</option>
        <option value="available">可追貨</option>
        <option value="unavailable">無法供應</option>
        <option value="clearance">專案出清</option>
      </select>
      <input class="filter-search" id="moq-search" placeholder="🔍 搜尋品名或條碼…" oninput="renderMOQ()">
      <span class="filter-count" id="moq-count">—</span>
    </div>
    <div class="tbl-wrap">
      <div class="tbl-header">
        <span class="tbl-title">MOQ 狀態與原廠下單回填</span>
        <span class="tbl-sub">即時儲存</span>
      </div>
      <table><thead><tr>
        <th style="width:50px">代理</th>
        <th style="width:58px">平台</th>
        <th style="width:70px">類型</th>
        <th>品名 / 國際條碼</th>
        <th style="width:68px;text-align:right">MOQ</th>
        <th style="width:75px;text-align:right">已登記</th>
        <th style="width:90px">進度</th>
        <th style="width:105px;text-align:right">向原廠下單</th>
        <th style="width:90px;text-align:right">剩餘可用</th>
        <th style="width:130px">貨物狀態</th>
        <th style="width:135px">到貨日 / 發售日</th>
      </tr></thead><tbody id="moq-tbody"></tbody></table>
    </div>
  </div>

  <!-- ══ 商品管理 ══ -->
  <div id="tab-products">
    <div class="add-form">
      <h3>新增品項</h3>
      <div class="form-grid">
        <div class="fg"><label>代理商</label>
          <select id="np-vendor">
            <option value="BNE">BNE（萬代南夢宮）</option>
            <option value="GS">GSE（Game Source）</option>
            <option value="SONY">SONY</option>
          </select></div>
        <div class="fg"><label>平台</label>
          <select id="np-platform"><option>NS</option><option>NS2</option><option>PS5</option><option>PS4</option><option>VR</option></select></div>
        <div class="fg"><label>類型</label>
          <select id="np-category">
            <option>軟體</option><option>主機</option><option>周邊</option>
            <option>女性向</option><option>誠翼</option><option>OLP</option>
            <option>PS4 HITS</option><option>SEGA</option><option>VR</option><option>軟體(三廠)</option>
          </select></div>
        <div class="fg"><label>AGBS P/N</label><input id="np-pn" placeholder="ZL.A00TZ.XXX"></div>
        <div class="fg"><label>國際條碼 (EAN)</label><input id="np-barcode" placeholder="4713014XXXXXX"></div>
        <div class="fg"><label>中文品名</label><input id="np-name"></div>
        <div class="fg"><label>規格 / 型號</label><input id="np-spec" placeholder="CFI-XXXX（SONY用）"></div>
        <div class="fg"><label>SRP（含稅）</label><input id="np-srp" type="number" placeholder="1490"></div>
        <div class="fg"><label>出貨價（未稅）</label><input id="np-price" type="number" placeholder="933"></div>
        <div class="fg"><label>優惠出貨價（SONY用）</label><input id="np-price-special" type="number" placeholder=""></div>
        <div class="fg"><label>MOQ</label><input id="np-moq" type="number" placeholder="0"></div>
        <div class="fg"><label>到貨日 / 發售日</label><input id="np-arrival" placeholder="2025/7/24 或 5月下旬到貨"></div>
        <div class="fg"><label>貨物狀態</label>
          <select id="np-status">
            <option value="">— 未設定</option>
            <option value="instock">現庫可出</option>
            <option value="incoming">即將到貨</option>
            <option value="limited">限量出完為止</option>
            <option value="tbc">確認供貨中</option>
            <option value="available">可追貨</option>
            <option value="unavailable">無法供應</option>
            <option value="clearance">專案出清</option>
            <option value="preorder">預購中</option>
          </select></div>
        <div class="fg"><label>分配出貨</label>
          <select id="np-alloc"><option value="false">否</option><option value="true">是（分配出貨）</option></select></div>
      </div>
      <button class="btn-add" onclick="addProduct()">＋ 新增品項</button>
    </div>

    <!-- 篩選列 -->
    <div class="filter-bar">
      <select class="filter-select" id="prod-vendor" onchange="renderProducts()">
        <option value="">全部代理商</option>
        <option value="BNE">BNE</option><option value="GS">GSE</option><option value="SONY">SONY</option>
      </select>
      <select class="filter-select" id="prod-platform" onchange="renderProducts()">
        <option value="">全部平台</option>
        <option>NS</option><option>NS2</option><option>PS5</option><option>PS4</option><option>VR</option>
      </select>
      <select class="filter-select" id="prod-category" onchange="renderProducts()">
        <option value="">全部類型</option>
      </select>
      <input class="filter-search" id="prod-search" placeholder="🔍 搜尋品名或條碼…" oninput="renderProducts()">
      <span class="filter-count" id="prod-count">—</span>
    </div>

    <div class="tbl-wrap">
      <div class="tbl-header"><span class="tbl-title">所有品項清單</span></div>
      <table><thead><tr>
        <th style="width:50px">代理</th>
        <th style="width:58px">平台</th>
        <th style="width:70px">類型</th>
        <th>品名 ／ AGM P/N ／ 國際條碼</th>
        <th style="width:68px;text-align:right">SRP</th>
        <th style="width:68px;text-align:right">出貨價</th>
        <th style="width:60px;text-align:right">MOQ</th>
        <th style="width:60px;text-align:right">上限</th>
        <th style="width:120px">狀態</th>
        <th style="width:118px">到貨日</th>
        <th style="width:55px;text-align:center">編輯</th>
        <th style="width:40px"></th>
      </tr></thead><tbody id="prod-tbody"></tbody></table>
    </div>
  </div>

  </div>
<!-- 編輯品項 Modal -->
<div class="modal-overlay hidden" id="edit-modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem">
  <div style="background:#fff;border-radius:var(--radius);padding:2rem;width:100%;max-width:680px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2)">
    <h2 style="font-size:1.2rem;font-weight:900;margin-bottom:1.5rem">✏️ 編輯品項</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.2rem">
      <div class="fg" style="grid-column:1/-1"><label>中文品名</label><input id="ep-name"></div>
      <div class="fg"><label>代理商</label>
        <select id="ep-vendor" disabled style="background:var(--surface2);cursor:not-allowed">
          <option value="BNE">BNE</option><option value="GS">GSE</option><option value="SONY">SONY</option>
        </select></div>
      <div class="fg"><label>平台</label>
        <select id="ep-platform"><option>NS</option><option>NS2</option><option>PS5</option><option>PS4</option><option>VR</option></select></div>
      <div class="fg"><label>類型</label>
        <select id="ep-category"><option>軟體</option><option>主機</option><option>周邊</option><option>女性向</option><option>誠翼</option><option>OLP</option><option>PS4 HITS</option><option>SEGA</option><option>VR</option><option>軟體(三廠)</option></select></div>
      <div class="fg"><label>AGBS P/N</label><input id="ep-pn" placeholder="ZL.A00TZ.XXX"></div>
      <div class="fg"><label>國際條碼 (EAN)</label><input id="ep-barcode" placeholder="4713014XXXXXX"></div>
      <div class="fg"><label>規格 / 型號</label><input id="ep-spec"></div>
      <div class="fg"><label>SRP（含稅）</label><input id="ep-srp" type="number"></div>
      <div class="fg"><label>出貨價（未稅）</label><input id="ep-price" type="number"></div>
      <div class="fg"><label>優惠出貨價</label><input id="ep-price-special" type="number"></div>
      <div class="fg"><label>MOQ（最低訂購量）</label><input id="ep-moq" type="number"></div>
      <div class="fg"><label>上限（maxOrder，空白=無上限）</label><input id="ep-max" type="number" placeholder="—"></div>
      <div class="fg"><label>分配出貨</label>
        <select id="ep-alloc"><option value="false">否</option><option value="true">是（分配出貨）</option></select></div>
      <div class="fg"><label>促銷標籤</label>
        <select id="ep-price-tag">
          <option value="">— 無</option>
          <option value="特價">特價</option>
          <option value="庫存出清">庫存出清</option>
          <option value="買1送1">買1送1</option>
          <option value="附贈品">附贈品</option>
          <option value="4月優惠">4月優惠</option>
          <option value="價格調整">價格調整</option>
          <option value="免費升級PS5">免費升級PS5</option>
        </select></div>
      <div class="fg" style="grid-column:1/-1"><label>附贈品說明（選填）</label>
        <input id="ep-gift" placeholder="例：預購特典 - 3D收藏卡"></div>
      <div class="fg" style="grid-column:1/-1"><label>備註（displayNote，選填）</label>
        <input id="ep-display-note" placeholder="例：現庫出清，售完為止"></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button onclick="closeEditModal()" style="background:#fff;border:2px solid var(--border);color:var(--text2);border-radius:var(--radius-sm);padding:9px 22px;font-family:var(--font);font-size:0.92rem;font-weight:600;cursor:pointer">取消</button>
      <button onclick="saveEditModal()" style="background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 22px;font-family:var(--font);font-size:0.92rem;font-weight:700;cursor:pointer">儲存變更</button>

// ── 類型下拉選項（動態從資料產生）────────────────────────────────────────────
function populateCategoryFilters(){
  const cats=new Set();
  Object.values(products).forEach(prods=>Object.values(prods).forEach(p=>{ if(p.category) cats.add(p.category); }));
  const opts='<option value="">全部類型</option>'+[...cats].sort().map(c=>`<option>${c}</option>`).join('');
  document.getElementById('moq-category').innerHTML=opts;
  document.getElementById('prod-category').innerHTML=opts;
}

function switchTab(tab,el){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); el.classList.add('active');
  ['moq','products'].forEach(t=>{
    const el2=document.getElementById('tab-'+t);
    if(el2) el2.classList.toggle('hidden',t!==tab);
  });
  if(tab==='moq')      renderMOQ();
  if(tab==='products') renderProducts();
}

// ── 取得篩選後的品項列表 ────────────────────────────────────────────────────
function getFilteredProducts(prefix){
  const vendor   = document.getElementById(prefix+'-vendor')?.value   || '';
  const platform = document.getElementById(prefix+'-platform')?.value || '';
  const category = document.getElementById(prefix+'-category')?.value || '';
  const search   = (document.getElementById(prefix+'-search')?.value  || '').toLowerCase();

  let rows=[];
  Object.entries(products).forEach(([v,prods])=>{
    if(vendor && v!==vendor) return;
    Object.values(prods).forEach(p=>{
      if(platform && p.platform!==platform) return;
      if(category && (p.category||'')!==category) return;
      if(search && !p.name.toLowerCase().includes(search) && !(p.barcode||'').includes(search)) return;
      rows.push({vendor:v,...p});
    });
  });
  return rows;
}

function getTotalOrders(pid){
  return Object.values(orders).reduce((s,dO)=>s+((dO||{})[pid]?.qty||0),0);
}

// ── MOQ 回填表 ──────────────────────────────────────────────────────────────
function renderMOQ(){
  const rows=getFilteredProducts('moq');
  document.getElementById('moq-count').textContent=rows.length+' 項';

  const statusOpts=STATUS_OPTS.map(o=>`<option value="${o.v}" >${o.l}</option>`).join('');

  document.getElementById('moq-tbody').innerHTML=rows.map(p=>{
    const total  = getTotalOrders(p.id);
    const pm     = pmData[p.id]||{};
    const ordered= pm.vendorOrdered||'';
    const arrival= pm.arrival || p.arrival || '';
    const status = (pm.status!==undefined ? pm.status : p.status) ?? '';

    const pct    = p.moq>0 ? Math.min(100,Math.round(total/p.moq*100)) : 0;
    const pCls   = total===0?'prog-zero':pct>=100?'prog-ok':'prog-low';
    const remaining = ordered!=='' ? Math.max(0,parseInt(ordered)-total) : '—';
    const remColor  = remaining==='—'?'var(--text3)':remaining>0?'var(--green)':'var(--red)';
    const sCls   = STATUS_MAP[status]?.cls||'s-empty';
    const sLabel = STATUS_MAP[status]?.l||'—';

    return `<tr>
      <td style="font-size:0.78rem;font-weight:700;color:var(--text2)">${p.vendor==='GS'?'GSE':p.vendor}</td>
      <td><span class="platform-tag ${p.platform}">${p.platform}</span></td>
      <td style="font-size:0.78rem;color:var(--text3)">${p.category||''}</td>
      <td>
        <div style="font-weight:600;font-size:0.88rem;line-height:1.3">${p.name}</div>
        ${p.barcode?`<div style="font-family:var(--mono);font-size:0.72rem;color:var(--text3);margin-top:2px">國條:${p.barcode}</div>`:''}
        ${p.isAllocation?`<span style="font-size:0.72rem;background:var(--amber-dim);color:var(--amber);padding:1px 6px;border-radius:4px;font-weight:700">⚠ 分配出貨</span>`:''}
      </td>
      <td style="text-align:right;font-family:var(--mono);font-weight:600">${p.moq||0}</td>
      <td style="text-align:right;font-family:var(--mono);font-weight:700;color:${total>=p.moq&&total>0?'var(--green)':total>0?'var(--amber)':'var(--text3)'}">${total}</td>
      <td>
        <div class="prog-wrap"><div class="prog-bar ${pCls}" style="width:${pct}%"></div></div>
        <div style="font-size:0.68rem;color:var(--text3);margin-top:2px;font-weight:600">${pct}%</div>
      </td>
      <td style="text-align:right">
        <input class="inline-num ${ordered!==''?'filled':''}" type="number" min="0" value="${ordered}" placeholder="—"
          onchange="setPMField('${p.id}','vendorOrdered',this.value)">
      </td>
      <td style="text-align:right;font-family:var(--mono);font-weight:700;color:${remColor}">${remaining}</td>
      <td>
        <select class="inline-select ${sCls}" onchange="setPMField('${p.id}','status',this.value)">
          ${STATUS_OPTS.map(o=>`<option value="${o.v}" ${status===o.v?'selected':''}>${o.l}</option>`).join('')}
        </select>
      </td>
      <td>
        <input class="inline-text ${arrival?'filled':''}" type="text" value="${arrival}" placeholder="2025/7/24"
          onchange="setPMField('${p.id}','arrival',this.value)">
      </td>
    </tr>`;
  }).join('');
}

async function setPMField(pid, field, value){
  if(!pmData[pid]) pmData[pid]={};
  pmData[pid][field]=value;
  await fbDB.ref(`pmData/${pid}`).update({[field]:value});
  showToast('已儲存');
  // 同步更新 product status/arrival（讓前台即時看到）
  if(field==='status'){
    // 找到這個 product 所在的 vendor
    for(const [vendor, prods] of Object.entries(products)){
      if(prods[pid]){ await fbDB.ref(`products/${vendor}/${pid}/status`).set(value); break; }
    }
  }
  if(field==='arrival'){
    for(const [vendor, prods] of Object.entries(products)){
      if(prods[pid]){ await fbDB.ref(`products/${vendor}/${pid}/arrival`).set(value); break; }
    }
  }
}

async function updateProd(vendor,pid,field,value){
  if(!products[vendor]||!products[vendor][pid]) return;
  products[vendor][pid][field]=value;
  await fbDB.ref(`products/${vendor}/${pid}`).update({[field]:value});
  showToast('已更新');
}

async function updateProdAndPM(vendor,pid,field,value){
  // 同時更新 product 和 pmData
  await Promise.all([
    fbDB.ref(`products/${vendor}/${pid}`).update({[field]:value}),
    fbDB.ref(`pmData/${pid}`).update({[field]:value}),
  ]);
  if(products[vendor]&&products[vendor][pid]) products[vendor][pid][field]=value;
  if(!pmData[pid]) pmData[pid]={};
  pmData[pid][field]=value;
  showToast('已更新');
}

async function deleteProd(vendor,pid){
  if(!confirm('確定刪除此品項？刪除後無法復原。')) return;
  await fbDB.ref(`products/${vendor}/${pid}`).remove();
  if(products[vendor]) delete products[vendor][pid];
  renderProducts(); showToast('已刪除');
}

async function addProduct(){
  const vendor  = document.getElementById('np-vendor').value;
  const pn      = document.getElementById('np-pn').value.trim();
  const barcode = document.getElementById('np-barcode').value.trim();
  const name    = document.getElementById('np-name').value.trim();
  const spec    = document.getElementById('np-spec').value.trim();
  const srp     = parseInt(document.getElementById('np-srp').value)||0;
  const price   = parseInt(document.getElementById('np-price').value)||0;
  const priceSpecial = parseInt(document.getElementById('np-price-special').value)||0;
  const moq     = parseInt(document.getElementById('np-moq').value)||0;
  const arrival = document.getElementById('np-arrival').value.trim();
  const status  = document.getElementById('np-status').value;
  const platform= document.getElementById('np-platform').value;
  const category= document.getElementById('np-category').value;
  const isAllocation = document.getElementById('np-alloc').value === 'true';
  if(!name){ alert('品名為必填'); return; }

  const id   = vendor+'_'+Date.now();
  const prod = {id,pn:pn||'—',platform,category,barcode,spec,name,srp,price,priceSpecial,moq,maxOrder:null,arrival,status,isAllocation};
  await fbDB.ref(`products/${vendor}/${id}`).set(prod);
  if(!products[vendor]) products[vendor]={};
  products[vendor][id]=prod;

  renderProducts(); populateCategoryFilters(); showToast('品項已新增');
  ['np-pn','np-barcode','np-name','np-spec','np-srp','np-price','np-price-special','np-moq','np-arrival'].forEach(i=>document.getElementById(i).value='');
}

  const rows=[['通路名稱','業務','通路代碼','專屬連結'].join(','),...Object.values(dealers).map(d=>[d.name,d.sales,(d.code+'2025').toUpperCase(),getDealerLink(d)].join(','))];

// ── 編輯品項 Modal ───────────────────────────────────────────────────────────
let _editVendor='', _editPid='';
function openEditModal(vendor, pid){
  _editVendor=vendor; _editPid=pid;
  const p=(products[vendor]||{})[pid]; if(!p) return;
  document.getElementById('ep-name').value=p.name||'';
  document.getElementById('ep-vendor').value=vendor;
  document.getElementById('ep-platform').value=p.platform||'NS';
  document.getElementById('ep-category').value=p.category||'軟體';
  document.getElementById('ep-pn').value=p.pn&&p.pn!=='—'?p.pn:'';
  document.getElementById('ep-barcode').value=p.barcode||'';
  document.getElementById('ep-spec').value=p.spec||'';
  document.getElementById('ep-srp').value=p.srp||0;
  document.getElementById('ep-price').value=p.price||0;
  document.getElementById('ep-price-special').value=p.priceSpecial||0;
  document.getElementById('ep-moq').value=p.moq||0;
  document.getElementById('ep-max').value=p.maxOrder||'';
  document.getElementById('ep-alloc').value=String(p.isAllocation||false);
  document.getElementById('ep-price-tag').value=p.priceTag||'';
  document.getElementById('ep-gift').value=p.giftItem||'';
  document.getElementById('ep-display-note').value=p.displayNote||'';
  document.getElementById('edit-modal').classList.remove('hidden');
}
function closeEditModal(){document.getElementById('edit-modal').classList.add('hidden');}
async function saveEditModal(){
  const vendor=_editVendor, pid=_editPid;
  if(!vendor||!pid) return;
  const updates={
    name:document.getElementById('ep-name').value.trim(),
    platform:document.getElementById('ep-platform').value,
    category:document.getElementById('ep-category').value,
    pn:document.getElementById('ep-pn').value.trim()||'—',
    barcode:document.getElementById('ep-barcode').value.trim(),
    spec:document.getElementById('ep-spec').value.trim(),
    srp:parseInt(document.getElementById('ep-srp').value)||0,
    price:parseInt(document.getElementById('ep-price').value)||0,
    priceSpecial:parseInt(document.getElementById('ep-price-special').value)||0,
    moq:parseInt(document.getElementById('ep-moq').value)||0,
    maxOrder:document.getElementById('ep-max').value&&parseInt(document.getElementById('ep-max').value)>0?parseInt(document.getElementById('ep-max').value):0,
    isAllocation:document.getElementById('ep-alloc').value==='true',
    priceTag:document.getElementById('ep-price-tag').value,
    giftItem:document.getElementById('ep-gift').value.trim(),
    displayNote:document.getElementById('ep-display-note').value.trim(),
  };
  if(!updates.name){alert('品名不能為空');return;}
  await fbDB.ref(`products/${vendor}/${pid}`).update(updates);
  if(!products[vendor]) products[vendor]={};
  Object.assign(products[vendor][pid], updates);
  closeEditModal(); renderProducts(); showToast('品項已更新');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.remove('hidden');setTimeout(()=>t.classList.add('hidden'),2500);}
